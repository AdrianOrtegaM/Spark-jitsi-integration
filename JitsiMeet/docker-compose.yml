services:
  web:
    image: jitsi/web:${JITSI_IMAGE_VERSION}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - "${CONFIG}/web:/config:Z"
      - "${CONFIG}/web/letsencrypt:/etc/letsencrypt:Z"
    environment:
      TZ: ${TZ}
      PUBLIC_URL: ${PUBLIC_URL}
      DOCKER_HOST_ADDRESS: ${DOCKER_HOST_ADDRESS}

      ENABLE_AUTH: ${ENABLE_AUTH}
      ENABLE_GUESTS: ${ENABLE_GUESTS}
      ENABLE_P2P: ${ENABLE_P2P}
      ENABLE_RECORDING: ${ENABLE_RECORDING}
      ENABLE_LIVESTREAMING: ${ENABLE_LIVESTREAMING}
      ENABLE_PREJOIN_PAGE: ${ENABLE_PREJOIN_PAGE}
      ENABLE_HTTP_REDIRECT: ${ENABLE_HTTP_REDIRECT}
      ENABLE_COLIBRI_WEBSOCKET: ${ENABLE_COLIBRI_WEBSOCKET}

      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN}
      XMPP_MUC_DOMAIN: ${XMPP_MUC_DOMAIN}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN}
      XMPP_GUEST_DOMAIN: ${XMPP_GUEST_DOMAIN}

      XMPP_BOSH_URL_BASE: http://prosody:5280
      XMPP_WEB_SOCKET_DOMAIN: ${XMPP_WEB_SOCKET_DOMAIN}
      XMPP_WEB_SOCKET_URL: ${XMPP_WEB_SOCKET_URL}
    depends_on:
      - prosody

  prosody:
    image: jitsi/prosody:${JITSI_IMAGE_VERSION}
    restart: unless-stopped
    volumes:
      - "${CONFIG}/prosody:/config:Z"
    environment:
      TZ: ${TZ}
      ENABLE_AUTH: ${ENABLE_AUTH}
      ENABLE_GUESTS: ${ENABLE_GUESTS}
      ENABLE_RECORDING: ${ENABLE_RECORDING}
      ENABLE_LIVESTREAMING: ${ENABLE_LIVESTREAMING}

      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN}
      XMPP_MUC_DOMAIN: ${XMPP_MUC_DOMAIN}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN}
      XMPP_GUEST_DOMAIN: ${XMPP_GUEST_DOMAIN}

      JICOFO_AUTH_USER: ${JICOFO_AUTH_USER}
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD}

      JVB_AUTH_USER: ${JVB_AUTH_USER}
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD}

      JIBRI_RECORDER_USER: ${JIBRI_RECORDER_USER}
      JIBRI_RECORDER_PASSWORD: ${JIBRI_RECORDER_PASSWORD}
      JIBRI_XMPP_USER: ${JIBRI_XMPP_USER}
      JIBRI_XMPP_PASSWORD: ${JIBRI_XMPP_PASSWORD}
      JIBRI_BREWERY_MUC: ${JIBRI_BREWERY_MUC}

  jicofo:
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION}
    restart: unless-stopped
    volumes:
      - "${CONFIG}/jicofo:/config:Z"
    environment:
      TZ: ${TZ}
      ENABLE_RECORDING: ${ENABLE_RECORDING}
      ENABLE_LIVESTREAMING: ${ENABLE_LIVESTREAMING}

      XMPP_SERVER: prosody
      XMPP_PORT: 5222
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN}
      XMPP_MUC_DOMAIN: ${XMPP_MUC_DOMAIN}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN}

      JICOFO_AUTH_USER: ${JICOFO_AUTH_USER}
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD}

      JIBRI_BREWERY_MUC: ${JIBRI_BREWERY_MUC}
      JIBRI_BREWERY_JID: ${JIBRI_BREWERY_JID}
    depends_on:
      - prosody

  jvb:
    image: jitsi/jvb:${JITSI_IMAGE_VERSION}
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    volumes:
      - "${CONFIG}/jvb:/config:Z"
    environment:
      TZ: ${TZ}
      XMPP_SERVER: prosody
      XMPP_PORT: 5222
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN}

      JVB_AUTH_USER: ${JVB_AUTH_USER}
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD}
      DOCKER_HOST_ADDRESS: ${DOCKER_HOST_ADDRESS}
      JVB_ADVERTISE_IPS: ${JVB_ADVERTISE_IPS}
      JVB_UDP_HARVESTER_DISABLED: ${JVB_UDP_HARVESTER_DISABLED}
      JVB_TCP_HARVESTER_DISABLED: ${JVB_TCP_HARVESTER_DISABLED}
      JVB_STUN_SERVERS: ${JVB_STUN_SERVERS}
      ENABLE_COLIBRI_WEBSOCKET: ${ENABLE_COLIBRI_WEBSOCKET}
    depends_on:
      - prosody

  jibri:
    image: jitsi/jibri:${JITSI_IMAGE_VERSION}
    restart: unless-stopped
    privileged: true
    volumes:
      - "${CONFIG}/jibri:/config:Z"
      - "/dev/shm:/dev/shm"
      - "./recordings:/config/recordings:Z"
    devices:
      - "/dev/snd:/dev/snd"
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    environment:
      TZ: ${TZ}
      DISPLAY: ":0"
      CHROMIUM_FLAGS: "${CHROMIUM_FLAGS}"

      JIBRI_RECORDING_DIR: /config/recordings
      JIBRI_FINALIZE_RECORDING_SCRIPT_PATH: /config/finalize.sh

      PUBLIC_URL: https://web
      IGNORE_CERTIFICATE_ERRORS: "1"

      XMPP_SERVER: prosody
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN}

      JIBRI_RECORDER_USER: ${JIBRI_RECORDER_USER}
      JIBRI_RECORDER_PASSWORD: ${JIBRI_RECORDER_PASSWORD}
      JIBRI_XMPP_USER: ${JIBRI_XMPP_USER}
      JIBRI_XMPP_PASSWORD: ${JIBRI_XMPP_PASSWORD}
      JIBRI_BREWERY_MUC: ${JIBRI_BREWERY_MUC}
    depends_on:
      - prosody
      - jicofo
      - jvb
